<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Nook Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1e1e24; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 300px; background: #2b2b36; display: flex; flex-direction: column; border-right: 1px solid #3f3f4e; z-index: 10; }
        #chat-history { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
        #chat-history p { margin: 5px 0; line-height: 1.4; overflow-wrap: break-word; }
        #chat-input-area { display: flex; padding: 10px; background: #23232c; }
        #chat-input { flex: 1; padding: 10px; border: none; border-radius: 4px; background: #1e1e24; color: #fff; outline: none; }
        
        /* Комната с фоном */
        #room { flex: 1; position: relative; background: url('https://images.unsplash.com/photo-1578662996442-48f60103fc96?q=80&w=2070&auto=format&fit=crop') center/cover; cursor: pointer; overflow: hidden; }
        
        /* Плавающий никнейм с плавной анимацией */
        .avatar { 
            position: absolute; 
            padding: 5px 12px; 
            background: rgba(0,0,0,0.7); 
            border-radius: 15px; 
            font-size: 13px; 
            font-weight: bold;
            transition: top 0.5s ease-out, left 0.5s ease-out; /* Плавность движения */
            pointer-events: none; /* Чтобы клик проходил сквозь аватарку на фон */
        }
        
        /* Окно входа */
        #overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; }
        #login-box { background: #2b2b36; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #nickname-input { padding: 12px; margin-top: 15px; width: 80%; border: none; border-radius: 6px; background: #1e1e24; color: #fff; text-align: center; font-size: 16px; outline: none; }
        button { padding: 12px 30px; margin-top: 20px; border: none; border-radius: 6px; background: #6c5ce7; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #5a4bcf; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="login-box">
            <h2>Добро пожаловать в Nook</h2>
            <input type="text" id="nickname-input" placeholder="Введи свой никнейм..." autofocus onkeypress="if(event.key === 'Enter') joinNook()">
            <br>
            <button onclick="joinNook()">Войти</button>
        </div>
    </div>

    <div id="sidebar">
        <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid #3f3f4e; text-align: center;">Текстовый чат</div>
        <div id="chat-history"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Написать сообщение..." onkeypress="if(event.key === 'Enter') sendMessage()">
        </div>
    </div>
    
    <div id="room"></div>

    <script>
        const socket = io('https://nook-chat.onrender.com'); 
        let myNick = '';
        const room = document.getElementById('room');

        function joinNook() {
            const input = document.getElementById('nickname-input');
            if (input.value.trim().length > 0) {
                myNick = input.value.trim();
                document.getElementById('overlay').style.display = 'none'; 
                
                // Ставим свой ник по центру при входе
                updateAvatar(myNick, 50, 50);
            }
        }

        // Логика перемещения по клику
        room.addEventListener('click', (e) => {
            if (!myNick) return; // Если не вошел, игнорируем клики

            const rect = room.getBoundingClientRect();
            // Высчитываем проценты
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            // Двигаем себя
            updateAvatar(myNick, x, y);
            
            // Сообщаем серверу
            socket.emit('move', { nick: myNick, x: x, y: y });
        });

        // Слушаем чужие перемещения
        socket.on('move', (data) => {
            updateAvatar(data.nick, data.x, data.y);
        });

        // Универсальная функция: создает аватар, если его нет, или двигает существующий
        function updateAvatar(nick, x, y) {
            let avatarId = 'avatar-' + nick;
            let avatar = document.getElementById(avatarId);

            if (!avatar) {
                avatar = document.createElement('div');
                avatar.id = avatarId;
                avatar.className = 'avatar';
                avatar.innerText = nick;
                room.appendChild(avatar);
            }

            avatar.style.left = `calc(${x}% - 20px)`;
            avatar.style.top = `calc(${y}% - 15px)`;
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (msg) {
                socket.emit('chatMessage', { nick: myNick, text: msg });
                addMessageToChat(myNick, msg, '#6c5ce7');
                input.value = '';
            }
        }

        socket.on('message', (data) => {
            addMessageToChat(data.nick, data.text, '#a29bfe');
            // Если кто-то написал в чат, но его аватарки еще нет (он не двигался), ставим его в центр
            if (!document.getElementById('avatar-' + data.nick)) {
                updateAvatar(data.nick, 50, 50);
            }
        });

        function addMessageToChat(nick, text, color) {
            const history = document.getElementById('chat-history');
            history.innerHTML += `<p><strong style="color:${color}">${nick}:</strong> ${text}</p>`;
            history.scrollTop = history.scrollHeight;
        }
    </script>
</body>
</html>
