<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nook Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1e1e24; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 300px; background: #2b2b36; display: flex; flex-direction: column; border-right: 1px solid #3f3f4e; z-index: 10; }
        
        #room-selector { padding: 10px; background: #1e1e24; border-bottom: 1px solid #3f3f4e; }
        #room-select { width: 100%; padding: 8px; background: #2b2b36; color: #fff; border: 1px solid #3f3f4e; border-radius: 4px; outline: none; cursor: pointer; }
        
        #online-header { padding: 10px 15px; font-weight: bold; border-bottom: 1px solid #3f3f4e; text-align: center; background: #23232c; font-size: 13px; }
        #online-list { padding: 10px 15px; border-bottom: 1px solid #3f3f4e; min-height: 40px; max-height: 120px; overflow-y: auto; font-size: 13px; color: #2ecc71; }
        .online-user-item { margin-bottom: 5px; }

        #chat-history { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
        #chat-history p { margin: 5px 0; line-height: 1.4; overflow-wrap: break-word; }
        #chat-input-area { display: flex; padding: 10px; background: #23232c; }
        #chat-input { flex: 1; padding: 10px; border: none; border-radius: 4px; background: #1e1e24; color: #fff; outline: none; }
        
        #room { flex: 1; position: relative; background-size: cover; background-position: center; cursor: pointer; overflow: hidden; transition: background-image 0.5s ease; }
        
        .avatar-container { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; transition: top 0.4s ease-out, left 0.4s ease-out; pointer-events: none; width: 120px; }
        .avatar-img { max-width: 100px; max-height: 120px; object-fit: contain; filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.5)); }
        .nick-label { background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-top: 5px; white-space: nowrap; }
        
        .speech-bubble { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 8px 12px; border-radius: 10px; font-size: 13px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); margin-bottom: 10px; max-width: 160px; word-wrap: break-word; white-space: normal; z-index: 20; animation: popIn 0.2s ease-out; }
        .speech-bubble::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border-width: 6px; border-style: solid; border-color: #fff transparent transparent transparent; }

        @keyframes popIn { from { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.9); } to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }
        
        #overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; }
        #login-box { background: #2b2b36; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; max-width: 90%; }
        .login-input { padding: 12px; margin-top: 15px; width: 90%; border: none; border-radius: 6px; background: #1e1e24; color: #fff; text-align: center; font-size: 14px; outline: none; box-sizing: border-box; }
        
        .file-input-wrapper { margin-top: 15px; text-align: left; width: 90%; margin-left: auto; margin-right: auto; }
        .file-input-label { display: block; padding: 10px; background: #3f3f4e; border-radius: 6px; text-align: center; cursor: pointer; font-size: 13px; transition: 0.2s; border: 1px dashed #6c5ce7; }
        .file-input-label:hover { background: #4e4e61; }
        #avatar-file-input { display: none; }
        
        #login-button { padding: 12px 30px; margin-top: 25px; border: none; border-radius: 6px; background: #6c5ce7; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 90%; }
        #login-button:hover { background: #5a4bcf; }
        #login-button:disabled { background: #4e4e61; cursor: not-allowed; }

        /* МЕДИАЗАПРОС ДЛЯ МОБИЛЬНЫХ ТЕЛЕФОНОВ */
        @media (max-width: 768px) {
            body { 
                flex-direction: column-reverse; /* Меняем порядок: комната сверху, панель снизу */
            }
            #sidebar { 
                width: 100%; 
                flex: 1; /* Занимает ровно половину высоты */
                border-right: none; 
                border-top: 2px solid #3f3f4e; 
            }
            #room { 
                flex: 1; /* Вторая половина высоты */
            }
            #login-box { 
                padding: 25px 15px; /* Чуть компактнее отступы внутри формы */
            }
            #online-list {
                max-height: 50px; /* Сжимаем список юзеров, чтобы отдать место тексту чата */
            }
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="login-box">
            <h2>Вход в Nook</h2>
            <input type="text" id="nickname-input" class="login-input" placeholder="Твой никнейм..." autofocus>
            
            <div class="file-input-wrapper">
                <label for="avatar-file-input" id="file-label" class="file-input-label">📁 Загрузить аватар с ПК</label>
                <input type="file" id="avatar-file-input" accept="image/*" onchange="displayFileName()">
            </div>
            
            <br>
            <button id="login-button" onclick="joinNook()">Войти в комнату</button>
        </div>
    </div>

    <div id="sidebar">
        <div id="room-selector">
            <select id="room-select" onchange="changeRoom()">
                <option value="main">Главная комната</option>
                <option value="sicily">Сицилийский берег</option>
                <option value="garden">Летний сад</option>
            </select>
        </div>

        <div id="online-header">В комнате: <span id="online-count">0</span></div>
        <div id="online-list"></div>

        <div style="padding: 10px 15px; font-weight: bold; border-bottom: 1px solid #3f3f4e; border-top: 1px solid #3f3f4e; text-align: center; background: #2b2b36; font-size: 13px;">Чат</div>
        <div id="chat-history"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Написать сообщение..." onkeypress="if(event.key === 'Enter') sendMessage()">
        </div>
    </div>
    
    <div id="room"></div>

    <script>
        const socket = io('https://nook-chat.onrender.com'); 
        let myNick = '';
        let myAvatarUrl = '';
        let currentRoom = 'main';
        const roomDiv = document.getElementById('room');

        const roomBackgrounds = {
            'main': 'https://images.unsplash.com/photo-1578662996442-48f60103fc96?q=80&w=2070&auto=format&fit=crop',
            'sicily': 'https://images.unsplash.com/photo-1533588145244-6330ce148d21?q=80&w=2070&auto=format&fit=crop',
            'garden': 'https://images.unsplash.com/photo-1558350172-2775a2f582f3?q=80&w=2070&auto=format&fit=crop'
        };

        roomDiv.style.backgroundImage = `url('${roomBackgrounds['main']}')`;

        window.addEventListener('DOMContentLoaded', () => {
            const savedNick = localStorage.getItem('nook_nick');
            const savedAvatar = localStorage.getItem('nook_avatar');

            if (savedNick) document.getElementById('nickname-input').value = savedNick;
            if (savedAvatar) {
                myAvatarUrl = savedAvatar;
                const label = document.getElementById('file-label');
                label.innerText = '✔️ Предыдущий аватар сохранен';
                label.style.borderColor = '#6c5ce7';
            }
        });

        function displayFileName() {
            const input = document.getElementById('avatar-file-input');
            const label = document.getElementById('file-label');
            if (input.files.length > 0) {
                label.innerText = '✔️ ' + input.files[0].name;
                label.style.borderColor = '#2ecc71';
            }
        }

        async function joinNook() {
            const nickInput = document.getElementById('nickname-input');
            const fileInput = document.getElementById('avatar-file-input');
            const loginBtn = document.getElementById('login-button');
            
            if (nickInput.value.trim().length > 0) {
                myNick = nickInput.value.trim();
                
                if (fileInput.files.length > 0) {
                    loginBtn.innerText = 'Загрузка аватара...';
                    loginBtn.disabled = true;
                    try {
                        myAvatarUrl = await uploadToCloudinary(fileInput.files[0]);
                    } catch (error) {
                        alert('Не удалось загрузить картинку.');
                    }
                }
                
                localStorage.setItem('nook_nick', myNick);
                localStorage.setItem('nook_avatar', myAvatarUrl);
                
                document.getElementById('overlay').style.display = 'none'; 
                socket.emit('joinRoom', { nick: myNick, room: currentRoom, avatar: myAvatarUrl, x: 50, y: 50 });
                updateAvatar(myNick, myAvatarUrl, 50, 50);
            }
        }

        function changeRoom() {
            const select = document.getElementById('room-select');
            currentRoom = select.value;
            roomDiv.style.backgroundImage = `url('${roomBackgrounds[currentRoom]}')`;
            document.getElementById('chat-history').innerHTML = '<p style="color: #aaa; font-style: italic; text-align: center;">Вы перешли в новую комнату</p>';
            
            const avatars = document.querySelectorAll('.avatar-container');
            avatars.forEach(avatar => {
                if (avatar.id !== 'avatar-' + myNick) avatar.remove();
            });

            socket.emit('joinRoom', { nick: myNick, room: currentRoom, avatar: myAvatarUrl, x: 50, y: 50 });
            updateAvatar(myNick, myAvatarUrl, 50, 50);
        }

        async function uploadToCloudinary(file) {
            const CLOUD_NAME = 'dzpqigdfz'; 
            const UPLOAD_PRESET = 'ml_default'; 
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
            if (!response.ok) throw new Error('Cloudinary upload failed');
            const data = await response.json();
            return data.secure_url;
        }

        socket.on('roomState', (usersInRoom) => {
            usersInRoom.forEach(u => {
                if (u.nick !== myNick) updateAvatar(u.nick, u.avatar, u.x, u.y);
            });
        });

        socket.on('userSpawned', (u) => {
            updateAvatar(u.nick, u.avatar, u.x, u.y);
        });

        socket.on('userLeft', (nick) => {
            const avatarNode = document.getElementById('avatar-' + nick);
            if (avatarNode) avatarNode.remove();
        });

        socket.on('updateOnlineList', (users) => {
            document.getElementById('online-count').innerText = users.length;
            const listDiv = document.getElementById('online-list');
            listDiv.innerHTML = users.map(user => `<div class="online-user-item">• ${user}</div>`).join('');
        });

        roomDiv.addEventListener('click', (e) => {
            if (!myNick) return; 
            const rect = roomDiv.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            updateAvatar(myNick, myAvatarUrl, x, y);
            socket.emit('move', { nick: myNick, avatar: myAvatarUrl, x: x, y: y });
        });

        socket.on('move', (data) => {
            updateAvatar(data.nick, data.avatar, data.x, data.y);
        });

        function updateAvatar(nick, avatarUrl, x, y) {
            let avatarId = 'avatar-' + nick;
            let avatarNode = document.getElementById(avatarId);

            if (!avatarNode) {
                avatarNode = document.createElement('div');
                avatarNode.id = avatarId;
                avatarNode.className = 'avatar-container';
                roomDiv.appendChild(avatarNode);
            }

            let existingBubble = avatarNode.querySelector('.speech-bubble');
            let bubbleHtml = existingBubble ? existingBubble.outerHTML : '';
            let imgHtml = avatarUrl ? `<img src="${avatarUrl}" class="avatar-img" onerror="this.style.display='none'" alt="prop">` : '';

            avatarNode.innerHTML = `${bubbleHtml}${imgHtml}<div class="nick-label">${nick}</div>`;
            avatarNode.style.left = `calc(${x}% - 60px)`; 
            avatarNode.style.top = `calc(${y}% - 60px)`;
        }

        function showSpeechBubble(nick, text) {
            const avatarId = 'avatar-' + nick;
            const avatarNode = document.getElementById(avatarId);
            if (!avatarNode) return;

            const oldBubble = avatarNode.querySelector('.speech-bubble');
            if (oldBubble) oldBubble.remove();

            const bubble = document.createElement('div');
            bubble.className = 'speech-bubble';
            bubble.innerText = text;
            
            avatarNode.insertBefore(bubble, avatarNode.firstChild);

            setTimeout(() => {
                if (bubble && bubble.parentNode) bubble.remove();
            }, 5000);
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (msg) {
                socket.emit('chatMessage', { nick: myNick, avatar: myAvatarUrl, text: msg });
                addMessageToChat(myNick, msg, '#6c5ce7');
                showSpeechBubble(myNick, msg); 
                input.value = '';
            }
        }

        socket.on('message', (data) => {
            addMessageToChat(data.nick, data.text, '#a29bfe');
            showSpeechBubble(data.nick, data.text); 
        });

        function addMessageToChat(nick, text, color) {
            const history = document.getElementById('chat-history');
            history.innerHTML += `<p><strong style="color:${color}">${nick}:</strong> ${text}</p>`;
            history.scrollTop = history.scrollHeight;
        }
    </script>
</body>
</html>
