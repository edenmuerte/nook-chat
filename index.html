<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nook Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #1e1e24; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 300px; background: #2b2b36; display: flex; flex-direction: column; border-right: 1px solid #3f3f4e; z-index: 10; }
        
        #room-selector { padding: 10px; background: #1e1e24; border-bottom: 1px solid #3f3f4e; display: flex; gap: 10px; }
        #room-select { width: 100%; padding: 8px; background: #2b2b36; color: #fff; border: 1px solid #3f3f4e; border-radius: 4px; outline: none; cursor: pointer; font-family: 'Inter', sans-serif; }
        
        .logout-btn { background: #ff4757; color: white; border: none; padding: 0 15px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; font-family: 'Inter', sans-serif; }
        .logout-btn:hover { background: #ff6b81; }

        #profile-panel { display: none; padding: 10px 15px; background: #23232c; border-bottom: 1px solid #3f3f4e; justify-content: space-between; align-items: center; }
        #my-nick-display { font-weight: 700; font-size: 14px; color: #6c5ce7; }
        .change-avatar-label { background: #3f3f4e; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.2s; border: 1px dashed #6c5ce7; }
        .change-avatar-label:hover { background: #4e4e61; }
        #change-avatar-input { display: none; }

        #online-header { padding: 10px 15px; font-weight: 600; border-bottom: 1px solid #3f3f4e; text-align: center; background: #23232c; font-size: 13px; }
        #online-list { padding: 10px 15px; border-bottom: 1px solid #3f3f4e; min-height: 40px; max-height: 120px; overflow-y: auto; font-size: 13px; color: #2ecc71; }
        
        .online-user-item { margin-bottom: 5px; cursor: pointer; transition: color 0.2s; }
        .online-user-item:hover { color: #fff; }

        #chat-history { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; scroll-behavior: smooth; }
        #chat-history p { margin: 5px 0; line-height: 1.4; overflow-wrap: break-word; }
        
        .msg-time { color: #7f8c8d; font-size: 11px; margin-right: 6px; font-family: monospace; }
        .system-msg-text { color: #f1c40f; font-style: italic; font-size: 13px; }

        .private-msg-text {
            color: #d8a1ff; 
            font-style: italic;
            border-left: 3px solid #d8a1ff;
            padding-left: 8px;
            background: rgba(216, 161, 255, 0.08); 
            border-radius: 0 4px 4px 0;
            padding-top: 4px;
            padding-bottom: 4px;
        }

        #chat-input-area { display: flex; flex-direction: column; padding: 10px; background: #23232c; border-top: 1px solid #3f3f4e; }
        
        #private-target-badge { display: none; background: #d8a1ff; color: #2b2b36; padding: 4px 10px; font-size: 12px; font-weight: 700; border-radius: 4px; margin-bottom: 5px; cursor: pointer; align-self: flex-start; }
        #private-target-badge:hover { background: #e3b8ff; }

        #typing-indicator { color: #a29bfe; font-size: 11px; font-style: italic; min-height: 16px; margin-bottom: 4px; transition: opacity 0.2s; opacity: 0; }

        #chat-input { padding: 12px; border: none; border-radius: 6px; background: #1e1e24; color: #fff; outline: none; font-family: 'Inter', sans-serif; font-size: 14px; }
        
        #room { flex: 1; position: relative; background-size: cover; background-position: center; cursor: pointer; overflow: hidden; transition: background-image 0.5s ease; }
        
        .avatar-container { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; transition: top 0.4s ease-out, left 0.4s ease-out; pointer-events: none; width: 120px; }
        .avatar-img { max-width: 100px; max-height: 120px; object-fit: contain; filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.5)); }
        .nick-label { background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-top: 5px; white-space: nowrap; }
        
        .speech-bubble { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 14px; border-radius: 12px; font-size: 13px; font-weight: 500; box-shadow: 0 4px 15px rgba(0,0,0,0.4); margin-bottom: 10px; max-width: 180px; word-wrap: break-word; white-space: normal; z-index: 20; animation: popIn 0.2s ease-out; line-height: 1.3; }
        .speech-bubble::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border-width: 6px; border-style: solid; border-color: #fff transparent transparent transparent; }

        .speech-bubble.private { background: rgba(255, 255, 255, 0.85); border: 1.5px dashed #d8a1ff; color: #2b2b36; box-shadow: 0 4px 15px rgba(216, 161, 255, 0.3); }
        .speech-bubble.private::after { border-color: rgba(255, 255, 255, 0.85) transparent transparent transparent; }

        @keyframes popIn { from { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.9); } to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }
        
        #overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; }
        #login-box { background: #2b2b36; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 320px; max-width: 90%; }
        
        #auth-tabs { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 1px solid #3f3f4e; }
        .auth-tab { padding: 10px; cursor: pointer; color: #aaa; font-weight: 600; transition: 0.2s; border-bottom: 2px solid transparent; }
        .auth-tab.active { color: #fff; border-bottom: 2px solid #6c5ce7; }
        
        .login-input { padding: 12px; margin-bottom: 15px; width: 100%; border: none; border-radius: 6px; background: #1e1e24; color: #fff; text-align: center; font-size: 14px; outline: none; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        .file-input-wrapper { text-align: left; width: 100%; margin-bottom: 15px; }
        .file-input-label { display: block; padding: 10px; background: #3f3f4e; border-radius: 6px; text-align: center; cursor: pointer; font-size: 13px; transition: 0.2s; border: 1px dashed #6c5ce7; font-weight: 500; }
        .file-input-label:hover { background: #4e4e61; }
        #avatar-file-input { display: none; }
        
        #auth-button { padding: 12px 30px; margin-top: 10px; border: none; border-radius: 6px; background: #6c5ce7; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%; font-family: 'Inter', sans-serif; }
        #auth-button:hover { background: #5a4bcf; }
        #auth-button:disabled { background: #4e4e61; cursor: not-allowed; }

        #error-msg { color: #ff7675; font-size: 13px; margin-top: 15px; display: none; }

        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }
            #sidebar { width: 100%; flex: 1; border-right: none; border-top: 2px solid #3f3f4e; }
            #room { flex: 1; }
            #login-box { padding: 25px 15px; }
            #online-list { max-height: 50px; }
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="login-box">
            <h2 id="auth-title" style="margin-top: 0;">Вход в Nook</h2>
            <div id="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="switchMode('login')">Вход</div>
                <div class="auth-tab" id="tab-register" onclick="switchMode('register')">Регистрация</div>
            </div>
            <input type="text" id="nickname-input" class="login-input" placeholder="Никнейм..." autofocus>
            <input type="password" id="password-input" class="login-input" placeholder="Пароль..." onkeypress="if(event.key === 'Enter') handleAuth()">
            <div id="register-fields" style="display: none;">
                <div class="file-input-wrapper">
                    <label for="avatar-file-input" id="file-label" class="file-input-label">📁 Аватар (необязательно)</label>
                    <input type="file" id="avatar-file-input" accept="image/*" onchange="displayFileName()">
                </div>
            </div>
            <button id="auth-button" onclick="handleAuth()">Войти</button>
            <div id="error-msg"></div>
        </div>
    </div>

    <div id="sidebar">
        <div id="room-selector">
            <select id="room-select" onchange="changeRoom()">
                <option value="main">Главная комната</option>
                <option value="sicily">Сицилийский берег</option>
                <option value="garden">Летний сад</option>
            </select>
            <button class="logout-btn" onclick="logout()" title="Выйти из аккаунта">Выйти</button>
        </div>

        <div id="profile-panel">
            <span id="my-nick-display"></span>
            <label for="change-avatar-input" id="change-avatar-label" class="change-avatar-label">🖼️ Сменить аватар</label>
            <input type="file" id="change-avatar-input" accept="image/*" onchange="handleChangeAvatar()">
        </div>

        <div id="online-header">В комнате: <span id="online-count">0</span></div>
        <div id="online-list"></div>
        <div style="padding: 10px 15px; font-weight: 600; border-bottom: 1px solid #3f3f4e; border-top: 1px solid #3f3f4e; text-align: center; background: #2b2b36; font-size: 13px;">Чат</div>
        <div id="chat-history"></div>
        <div id="chat-input-area">
            <div id="private-target-badge" onclick="clearPrivateTarget()" title="Нажмите, чтобы отменить"></div>
            <div id="typing-indicator"></div>
            <input type="text" id="chat-input" placeholder="Написать сообщение..." maxlength="500">
        </div>
    </div>
    
    <div id="room"></div>

    <script>
        const socket = io('https://nook-chat.onrender.com'); 
        let myNick = '';
        let myAvatarUrl = '';
        let currentRoom = 'main';
        let authMode = 'login'; 
        let privateTarget = null; 
        
        let myX = 50;
        let myY = 50;

        let typingTimer;
        const TYPING_TIMER_LENGTH = 1500;
        let amITyping = false;
        const typingUsers = new Set(); 

        // --- ЛОГИКА УВЕДОМЛЕНИЙ В ФОНЕ (ВКЛАДКИ И ЗВУКИ) ---
        let isTabActive = true;
        let unreadCount = 0;
        const originalTitle = 'Nook Chat';

        // Набор аккуратных звуков
        const sfx = {
            message: new Audio('https://actions.google.com/sounds/v1/water/water_drop.ogg'), // Легкая капля
            private: new Audio('https://actions.google.com/sounds/v1/communications/incoming_text_ping.ogg'), // Звонкий пинг
            enter: new Audio('https://actions.google.com/sounds/v1/doors/wood_door_open.ogg'), // Дверь открылась
            leave: new Audio('https://actions.google.com/sounds/v1/doors/wood_door_close.ogg')  // Дверь закрылась
        };

        // Делаем звуки тише, чтобы не пугали
        Object.values(sfx).forEach(audio => audio.volume = 0.4);

        // Отслеживаем, открыта ли вкладка
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isTabActive = false;
            } else {
                isTabActive = true;
                unreadCount = 0;
                document.title = originalTitle;
            }
        });

        // Функция воспроизведения звука
        function playSound(type) {
            // Играем звук только если вкладка скрыта
            if (!isTabActive && sfx[type]) {
                sfx[type].play().catch(e => console.log('Автовоспроизведение заблокировано браузером', e));
            }
        }

        // Функция обновления заголовка вкладки
        function notifyBackground(isPrivate = false) {
            if (!isTabActive) {
                unreadCount++;
                const icon = isPrivate ? '🔒' : '💬';
                document.title = `(${unreadCount}) ${icon} Новое сообщение!`;
            }
        }
        // --------------------------------------------------

        const roomDiv = document.getElementById('room');
        const chatInput = document.getElementById('chat-input');
        const typingIndicator = document.getElementById('typing-indicator');

        const roomBackgrounds = {
            'main': 'https://images.unsplash.com/photo-1578662996442-48f60103fc96?q=80&w=2070&auto=format&fit=crop',
            'sicily': 'https://images.unsplash.com/photo-1533588145244-6330ce148d21?q=80&w=2070&auto=format&fit=crop',
            'garden': 'https://images.unsplash.com/photo-1558350172-2775a2f582f3?q=80&w=2070&auto=format&fit=crop'
        };
        roomDiv.style.backgroundImage = `url('${roomBackgrounds['main']}')`;

        chatInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendMessage();
            }
        });

        chatInput.addEventListener('input', () => {
            if (!amITyping) {
                amITyping = true;
                socket.emit('typing', true);
            }
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                amITyping = false;
                socket.emit('typing', false);
            }, TYPING_TIMER_LENGTH);
        });

        socket.on('userTyping', (data) => {
            if (data.isTyping) {
                typingUsers.add(data.nick);
            } else {
                typingUsers.delete(data.nick);
            }
            updateTypingDisplay();
        });

        function updateTypingDisplay() {
            if (typingUsers.size === 0) {
                typingIndicator.style.opacity = '0';
            } else {
                typingIndicator.style.opacity = '1';
                if (typingUsers.size === 1) {
                    typingIndicator.innerText = `${Array.from(typingUsers)[0]} печатает...`;
                } else {
                    typingIndicator.innerText = `Несколько человек печатают...`;
                }
            }
        }

        function getTimestamp() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            return `${hh}:${mm}`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedNick = localStorage.getItem('nook_nick');
            const savedPass = localStorage.getItem('nook_pass');
            if (savedNick && savedPass) {
                document.getElementById('nickname-input').value = savedNick;
                document.getElementById('password-input').value = savedPass;
            }
        });

        function logout() {
            localStorage.removeItem('nook_nick');
            localStorage.removeItem('nook_pass');
            window.location.reload(); 
        }

        function switchMode(mode) {
            authMode = mode;
            document.getElementById('error-msg').style.display = 'none';
            if (mode === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('tab-register').classList.remove('active');
                document.getElementById('register-fields').style.display = 'none';
                document.getElementById('auth-button').innerText = 'Войти';
                document.getElementById('auth-title').innerText = 'Вход в Nook';
            } else {
                document.getElementById('tab-register').classList.add('active');
                document.getElementById('tab-login').classList.remove('active');
                document.getElementById('register-fields').style.display = 'block';
                document.getElementById('auth-button').innerText = 'Зарегистрироваться';
                document.getElementById('auth-title').innerText = 'Новый аккаунт';
            }
        }

        function displayFileName() {
            const input = document.getElementById('avatar-file-input');
            const label = document.getElementById('file-label');
            if (input.files.length > 0) {
                label.innerText = '✔️ ' + input.files[0].name;
                label.style.borderColor = '#2ecc71';
            }
        }

        function showError(text) {
            const errDiv = document.getElementById('error-msg');
            errDiv.innerText = text;
            errDiv.style.display = 'block';
        }

        async function handleAuth() {
            const nick = document.getElementById('nickname-input').value.trim();
            const pass = document.getElementById('password-input').value.trim();
            const btn = document.getElementById('auth-button');
            if (!nick || !pass) { showError('Пожалуйста, введи никнейм и пароль.'); return; }
            btn.disabled = true; btn.innerText = 'Секундочку...'; document.getElementById('error-msg').style.display = 'none';

            if (authMode === 'register') {
                let avatarUrl = '';
                const fileInput = document.getElementById('avatar-file-input');
                if (fileInput.files.length > 0) {
                    btn.innerText = 'Загружаем аватар...';
                    try { avatarUrl = await uploadToCloudinary(fileInput.files[0]); } 
                    catch (error) { showError('Не удалось загрузить картинку.'); btn.disabled = false; btn.innerText = 'Зарегистрироваться'; return; }
                }
                socket.emit('register', { nick, password: pass, avatar: avatarUrl }, (response) => {
                    if (response.success) { myNick = nick; myAvatarUrl = avatarUrl; finalizeAuth(nick, pass); } 
                    else { showError(response.message); btn.disabled = false; btn.innerText = 'Зарегистрироваться'; }
                });
            } else {
                socket.emit('login', { nick, password: pass }, (response) => {
                    if (response.success) { myNick = nick; myAvatarUrl = response.avatar; finalizeAuth(nick, pass); } 
                    else { showError(response.message); btn.disabled = false; btn.innerText = 'Войти'; }
                });
            }
        }

        function finalizeAuth(nick, pass) {
            localStorage.setItem('nook_nick', nick);
            localStorage.setItem('nook_pass', pass);
            document.getElementById('overlay').style.display = 'none'; 
            
            document.getElementById('my-nick-display').innerText = nick;
            document.getElementById('profile-panel').style.display = 'flex';

            myX = 50; myY = 50;
            socket.emit('joinRoom', { nick: myNick, room: currentRoom, avatar: myAvatarUrl, x: myX, y: myY });
            updateAvatar(myNick, myAvatarUrl, myX, myY);
        }

        async function uploadToCloudinary(file) {
            const CLOUD_NAME = 'dzpqigdfz'; 
            const UPLOAD_PRESET = 'ml_default'; 
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
            if (!response.ok) throw new Error('Cloudinary upload failed');
            const data = await response.json();
            return data.secure_url;
        }

        async function handleChangeAvatar() {
            const input = document.getElementById('change-avatar-input');
            const label = document.getElementById('change-avatar-label');
            if (input.files.length === 0) return;

            const oldText = label.innerText;
            label.innerText = '⌛ Загрузка...';

            try {
                const newUrl = await uploadToCloudinary(input.files[0]);
                myAvatarUrl = newUrl;

                socket.emit('changeAvatar', newUrl, (response) => {
                    if (response.success) {
                        label.innerText = '✔️ Готово';
                        updateAvatar(myNick, myAvatarUrl, myX, myY);
                        setTimeout(() => { label.innerText = oldText; }, 2000);
                    } else {
                        alert(response.message);
                        label.innerText = oldText;
                    }
                });
            } catch (error) {
                alert('Не удалось загрузить аватар на облако.');
                label.innerText = oldText;
            }
        }

        function setPrivateTarget(nick) {
            if (nick === myNick) return; 
            privateTarget = nick;
            const badge = document.getElementById('private-target-badge');
            badge.innerText = `Шепот для: ${nick} ✖`;
            badge.style.display = 'block';
            chatInput.focus();
        }

        function clearPrivateTarget() {
            privateTarget = null;
            document.getElementById('private-target-badge').style.display = 'none';
        }

        function changeRoom() {
            const select = document.getElementById('room-select');
            currentRoom = select.value;
            roomDiv.style.backgroundImage = `url('${roomBackgrounds[currentRoom]}')`;
            
            const avatars = document.querySelectorAll('.avatar-container');
            avatars.forEach(avatar => { if (avatar.id !== 'avatar-' + myNick) avatar.remove(); });
            
            typingUsers.clear();
            updateTypingDisplay();

            myX = 50; myY = 50;
            socket.emit('joinRoom', { nick: myNick, room: currentRoom, avatar: myAvatarUrl, x: myX, y: myY });
            updateAvatar(myNick, myAvatarUrl, myX, myY);
        }

        socket.on('roomState', (usersInRoom) => {
            usersInRoom.forEach(u => { if (u.nick !== myNick) updateAvatar(u.nick, u.avatar, u.x, u.y); });
        });

        // ВОСПРОИЗВОДИМ ЗВУК ПРИ ВХОДЕ (если скрыта вкладка)
        socket.on('userSpawned', (u) => { 
            updateAvatar(u.nick, u.avatar, u.x, u.y); 
            playSound('enter');
        });
        
        // ВОСПРОИЗВОДИМ ЗВУК ПРИ ВЫХОДЕ (если скрыта вкладка)
        socket.on('userLeft', (nick) => {
            const avatarNode = document.getElementById('avatar-' + nick);
            if (avatarNode) avatarNode.remove();
            
            if (typingUsers.has(nick)) {
                typingUsers.delete(nick);
                updateTypingDisplay();
            }
            playSound('leave');
        });

        socket.on('updateOnlineList', (users) => {
            document.getElementById('online-count').innerText = users.length;
            const listDiv = document.getElementById('online-list');
            listDiv.innerHTML = users.map(user => 
                `<div class="online-user-item" onclick="setPrivateTarget('${user}')" title="Написать личное сообщение">• ${user}</div>`
            ).join('');
        });

        roomDiv.addEventListener('click', (e) => {
            if (!myNick) return; 
            const rect = roomDiv.getBoundingClientRect();
            myX = ((e.clientX - rect.left) / rect.width) * 100;
            myY = ((e.clientY - rect.top) / rect.height) * 100;
            
            updateAvatar(myNick, myAvatarUrl, myX, myY);
            socket.emit('move', { nick: myNick, avatar: myAvatarUrl, x: myX, y: myY });
        });

        socket.on('move', (data) => { updateAvatar(data.nick, data.avatar, data.x, data.y); });

        function updateAvatar(nick, avatarUrl, x, y) {
            let avatarId = 'avatar-' + nick;
            let avatarNode = document.getElementById(avatarId);
            if (!avatarNode) {
                avatarNode = document.createElement('div');
                avatarNode.id = avatarId;
                avatarNode.className = 'avatar-container';
                roomDiv.appendChild(avatarNode);
            }
            let existingBubble = avatarNode.querySelector('.speech-bubble');
            let bubbleHtml = existingBubble ? existingBubble.outerHTML : '';
            let imgHtml = avatarUrl ? `<img src="${avatarUrl}" class="avatar-img" onerror="this.style.display='none'" alt="prop">` : '';

            avatarNode.innerHTML = `${bubbleHtml}${imgHtml}<div class="nick-label">${nick}</div>`;
            avatarNode.style.left = `calc(${x}% - 60px)`; 
            avatarNode.style.top = `calc(${y}% - 60px)`;
            
            avatarNode.style.zIndex = Math.floor(y * 10);
        }

        function showSpeechBubble(nick, text, isPrivate = false) {
            const avatarId = 'avatar-' + nick;
            const avatarNode = document.getElementById(avatarId);
            if (!avatarNode) return;

            const oldBubble = avatarNode.querySelector('.speech-bubble');
            if (oldBubble) oldBubble.remove();

            const bubble = document.createElement('div');
            bubble.className = isPrivate ? 'speech-bubble private' : 'speech-bubble';
            bubble.innerText = text;
            
            avatarNode.insertBefore(bubble, avatarNode.firstChild);
            setTimeout(() => { if (bubble && bubble.parentNode) bubble.remove(); }, 5000);
        }

        function linkify(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, url => `<a href="${url}" target="_blank" style="color: #a29bfe; text-decoration: underline;">${url}</a>`);
        }

        function appendToHistory(htmlString) {
            const history = document.getElementById('chat-history');
            const isNearBottom = history.scrollHeight - history.scrollTop - history.clientHeight < 50;
            
            history.insertAdjacentHTML('beforeend', htmlString);
            
            if (isNearBottom) {
                history.scrollTop = history.scrollHeight;
            }
        }

        function sendMessage() {
            const msg = chatInput.value.trim();
            
            if (msg.length > 500) {
                alert('Сообщение слишком длинное!');
                return;
            }

            if (msg) {
                if (privateTarget) {
                    socket.emit('privateMessage', { to: privateTarget, text: msg });
                } else {
                    socket.emit('chatMessage', { nick: myNick, avatar: myAvatarUrl, text: msg });
                    addMessageToChat(myNick, msg, '#6c5ce7');
                    showSpeechBubble(myNick, msg, false); 
                }
                chatInput.value = '';
                
                amITyping = false;
                socket.emit('typing', false);
                clearTimeout(typingTimer);
            }
        }

        function addMessageToChat(nick, text, color) {
            const time = getTimestamp();
            const safeText = linkify(text);
            const html = `<p><span class="msg-time">[${time}]</span><strong style="color:${color}">${nick}:</strong> ${safeText}</p>`;
            appendToHistory(html);
        }

        // ОБРАБОТКА ВХОДЯЩИХ СООБЩЕНИЙ СО ЗВУКОМ И УВЕДОМЛЕНИЯМИ
        socket.on('message', (data) => {
            addMessageToChat(data.nick, data.text, '#a29bfe');
            showSpeechBubble(data.nick, data.text, false); 
            playSound('message');
            notifyBackground(false);
        });

        socket.on('privateMessage', (data) => {
            const isMe = (data.from === myNick);
            const displayNick = isMe ? `(Шепот для ${data.to})` : `(Шепот от ${data.from})`;
            const time = getTimestamp();
            const safeText = linkify(data.text);
            
            const html = `<p class="private-msg-text"><span class="msg-time">[${time}]</span><strong>${displayNick}:</strong> ${safeText}</p>`;
            appendToHistory(html);

            const bubbleTarget = isMe ? myNick : data.from;
            showSpeechBubble(bubbleTarget, data.text, true); 
            
            // Если сообщение пришло нам (а не мы сами его отправили), проигрываем звук
            if (!isMe) {
                playSound('private');
                notifyBackground(true);
            }
        });

        socket.on('systemMessage', (data) => {
            const time = getTimestamp();
            const html = `<p class="system-msg-text"><span class="msg-time">[${time}]</span> • ${data.text}</p>`;
            appendToHistory(html);
        });
    </script>
</body>
</html>
