<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Nook Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1e1e24; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 300px; background: #2b2b36; display: flex; flex-direction: column; border-right: 1px solid #3f3f4e; z-index: 10; }
        #chat-history { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
        #chat-history p { margin: 5px 0; line-height: 1.4; overflow-wrap: break-word; }
        #chat-input-area { display: flex; padding: 10px; background: #23232c; }
        #chat-input { flex: 1; padding: 10px; border: none; border-radius: 4px; background: #1e1e24; color: #fff; outline: none; }
        
        #room { flex: 1; position: relative; background: url('https://images.unsplash.com/photo-1578662996442-48f60103fc96?q=80&w=2070&auto=format&fit=crop') center/cover; cursor: pointer; overflow: hidden; }
        
        /* Обновленный контейнер для аватарки и ника */
        .avatar-container { 
            position: absolute; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            transition: top 0.4s ease-out, left 0.4s ease-out; 
            pointer-events: none; 
            width: 120px; /* Фиксируем ширину для ровного центрирования клика */
        }
        
        /* Сама картинка персонажа */
        .avatar-img {
            max-width: 100px;
            max-height: 120px;
            object-fit: contain; /* Сохраняем пропорции */
            filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.5)); /* Добавляем легкую тень персонажу */
        }
        
        /* Плашка с ником под персонажем */
        .nick-label {
            background: rgba(0,0,0,0.7); 
            padding: 4px 10px; 
            border-radius: 12px; 
            font-size: 12px; 
            font-weight: bold;
            margin-top: 5px;
            white-space: nowrap;
        }
        
        #overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; }
        #login-box { background: #2b2b36; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; }
        
        /* Поля ввода на экране логина */
        .login-input { padding: 12px; margin-top: 15px; width: 90%; border: none; border-radius: 6px; background: #1e1e24; color: #fff; text-align: center; font-size: 14px; outline: none; box-sizing: border-box; }
        
        button { padding: 12px 30px; margin-top: 25px; border: none; border-radius: 6px; background: #6c5ce7; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 90%; }
        button:hover { background: #5a4bcf; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="login-box">
            <h2>Вход в Nook</h2>
            <input type="text" id="nickname-input" class="login-input" placeholder="Твой никнейм..." autofocus>
            <input type="text" id="avatar-input" class="login-input" placeholder="URL картинки (необязательно)..." onkeypress="if(event.key === 'Enter') joinNook()">
            <br>
            <button onclick="joinNook()">Войти в комнату</button>
        </div>
    </div>

    <div id="sidebar">
        <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid #3f3f4e; text-align: center;">Текстовый чат</div>
        <div id="chat-history"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Написать сообщение..." onkeypress="if(event.key === 'Enter') sendMessage()">
        </div>
    </div>
    
    <div id="room"></div>

    <script>
        const socket = io('https://nook-chat.onrender.com'); 
        let myNick = '';
        let myAvatarUrl = '';
        const room = document.getElementById('room');

        function joinNook() {
            const nickInput = document.getElementById('nickname-input');
            const avatarInput = document.getElementById('avatar-input');
            
            if (nickInput.value.trim().length > 0) {
                myNick = nickInput.value.trim();
                myAvatarUrl = avatarInput.value.trim();
                
                document.getElementById('overlay').style.display = 'none'; 
                
                // Спавнимся в центре
                updateAvatar(myNick, myAvatarUrl, 50, 50);
            }
        }

        room.addEventListener('click', (e) => {
            if (!myNick) return; 

            const rect = room.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            updateAvatar(myNick, myAvatarUrl, x, y);
            
            // Теперь отправляем и координаты, и ссылку на аватар
            socket.emit('move', { nick: myNick, avatar: myAvatarUrl, x: x, y: y });
        });

        // Чужие перемещения
        socket.on('move', (data) => {
            updateAvatar(data.nick, data.avatar, data.x, data.y);
        });

        // Функция отрисовки персонажа
        function updateAvatar(nick, avatarUrl, x, y) {
            let avatarId = 'avatar-' + nick;
            let avatarNode = document.getElementById(avatarId);

            // Если персонажа еще нет на экране — создаем
            if (!avatarNode) {
                avatarNode = document.createElement('div');
                avatarNode.id = avatarId;
                avatarNode.className = 'avatar-container';
                room.appendChild(avatarNode);
            }

            // Формируем внутренности (картинка + ник)
            let imgHtml = '';
            if (avatarUrl) {
                // Если ссылка есть, добавляем тег <img>
                imgHtml = `<img src="${avatarUrl}" class="avatar-img" onerror="this.style.display='none'" alt="prop">`;
            }

            // Пересобираем HTML внутри контейнера
            avatarNode.innerHTML = `
                ${imgHtml}
                <div class="nick-label">${nick}</div>
            `;

            // Центрируем по координатам клика (смещаем на половину ширины контейнера)
            avatarNode.style.left = `calc(${x}% - 60px)`; 
            avatarNode.style.top = `calc(${y}% - 60px)`;
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (msg) {
                // Отправляем сообщение + нашу аватарку
                socket.emit('chatMessage', { nick: myNick, avatar: myAvatarUrl, text: msg });
                addMessageToChat(myNick, msg, '#6c5ce7');
                input.value = '';
            }
        }

        socket.on('message', (data) => {
            addMessageToChat(data.nick, data.text, '#a29bfe');
            // Если кто-то написал, но его аватарки еще нет (он не двигался), ставим его в центр
            if (!document.getElementById('avatar-' + data.nick)) {
                updateAvatar(data.nick, data.avatar, 50, 50);
            }
        });

        function addMessageToChat(nick, text, color) {
            const history = document.getElementById('chat-history');
            history.innerHTML += `<p><strong style="color:${color}">${nick}:</strong> ${text}</p>`;
            history.scrollTop = history.scrollHeight;
        }
    </script>
</body>
</html>
